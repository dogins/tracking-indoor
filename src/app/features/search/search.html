<section class="screen">
	<app-topbar
		title="Buscar producto"
		subtitle="FILTRO EN TIEMPO REAL"
		[showBack]="true"
		backLabel="Volver al mapa"
		(back)="backToMap()"
	/>

	<main class="search-main">
		@if (currentZone$ | async; as zone) {
			<p class="current-zone">Zona actual: {{ zone.icon }} {{ zone.name }} ({{ zone.code }})</p>
		} @else {
			<p class="current-zone">Zona actual: no definida</p>
		}

		<input
			class="search-input"
			[formControl]="queryControl"
			type="search"
			placeholder="Ej: grifo, tornillos, LED"
			aria-label="Buscar producto"
		/>

		<div class="results">
			@for (product of products$ | async; track product.id) {
				<button type="button" class="product-card" (click)="selectProduct(product)">
					<span class="emoji">{{ product.emoji }}</span>
					<span class="name">{{ product.name }}</span>
					<span class="meta">{{ product.meta }} · {{ product.loc }} · {{ product.price }}</span>
				</button>
			} @empty {
				<p class="empty">Sin resultados para tu búsqueda.</p>
			}
		</div>
	</main>
</section>
